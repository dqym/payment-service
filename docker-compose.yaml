services:
  postgres:
    image: postgres:16-alpine
    container_name: payment-postgres
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payment_service"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: payment-rabbitmq
    restart: unless-stopped
    env_file:
      - ./env/rabbitmq.env
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-api
    restart: unless-stopped
    command: ["bash", "/app/docker/start-api.sh"]
    ports:
      - "8000:8000"
    env_file:
      - ./env/api.env
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-worker
    restart: unless-stopped
    command: ["bash", "/app/docker/start-worker.sh"]
    env_file:
      - ./env/worker.env
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
